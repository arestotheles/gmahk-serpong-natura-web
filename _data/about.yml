intro: GMAHK Serpong Natura adalah komunitas Gereja Masehi Advent Hari Ketujuh yang melayani wilayah Serpong dan sekitarnya.
vision_title: Visi Kami
vision: Menjadi komunitas yang mengasihi Tuhan, saling mengasihi, dan melayani sesama dengan kasih Kristus.
history_title: Sejarah Singkat
history: Gereja ini didirikan untuk memberikan ruang ibadah, pertumbuhan rohani, dan persekutuan bagi keluarga di Serpong Natura. Kami mengundang Anda untuk mengenal kami lebih dekat melalui ibadah Sabat dan kegiatan jemaat.
join_title: Bergabung dengan Kami
join_text: Anda dipersilakan hadir pada ibadah Sabtu. Lihat jadwal di atas atau hubungi kami di bagian Kontak.

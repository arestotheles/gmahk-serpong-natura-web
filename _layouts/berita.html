---
layout: default
---
<article class="berita-post">
  <div class="section-band section-band--page">
    <div class="section-inner">
      <header class="post-header">
        <p class="post-meta">
          {{ page.date | date: "%d %B %Y" }}
          {% include berita-instagram-badge.html post=page %}
        </p>
        <h1>{{ page.title }}</h1>
      </header>
      {% include cover-image.html %}
      <div class="prose">
        {{ content }}
      </div>
      {% include attachments.html %}
      <p class="back-link"><a href="{{ '/berita/' | relative_url }}">&larr; Kembali ke Berita</a></p>
    </div>
  </div>
</article>

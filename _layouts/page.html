---
layout: default
---
<article class="page-content">
  <div class="section-band section-band--page">
    <div class="section-inner">
      {% if page.title %}
        <header class="page-header">
          <h1>{{ page.title }}</h1>
        </header>
      {% endif %}
      <div class="prose page-prose">
        {{ content }}
      </div>
    </div>
  </div>
</article>
